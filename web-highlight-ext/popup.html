<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 240px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 12px;
      color: #89b4fa;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      padding: 8px;
      border-radius: 6px;
      background: #313244;
      font-size: 12px;
    }
    .status.ok { color: #a6e3a1; }
    .status.err { color: #f38ba8; }
    .shortcut {
      color: #6c7086;
      font-size: 11px;
      margin-top: 8px;
    }
    a {
      color: #89b4fa;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>🖍️ DevLog Highlighter</h1>
  <div id="status" class="status">Checking server…</div>
  <div class="shortcut">
    Usage:<br>
    1. Select text on any page<br>
    2. Click <strong>Save</strong> in popup<br>
    3. Auto-syncs to my-devlog
  </div>
  <script src="popup.js"></script>
</body>
</html>
